ranges:
  mmsi:
    min: 100000000
    max: 999999999

  latitude:
    min: -90.0
    max: 90.0
    allow_null: true

  longitude:
    min: -180.0
    max: 180.0
    allow_null: true

  sog:
    min: 0.0
    max: 102.2
    reserved: [102.3]
    allow_null: true

  cog:
    min: 0.0
    max: 359.9
    reserved: [360.0]
    allow_null: true

  true_heading:
    min: 0
    max: 359
    reserved: [511]
    allow_null: true

  rate_of_turn_raw:
    min: -128
    max: 127
    allow_null: true

  timestamp_utc_sec:
    min: 0
    max: 63
    allow_null: true

  draught:
    min: 0.0
    max: 25.5
    allow_null: true

  imo_number:
    min: 1000000
    max: 9999999
    allow_null: true

quality_rules:
  error_violations:
    - MSG_ID_CONST
    - MMSI_FORMAT
    - MMSI_RANGE
    - LAT_RANGE
    - LON_RANGE

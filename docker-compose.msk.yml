# ─────────────────────────────────────────────────────────────────────────────
# Override: read from REAL MSK instead of local Redpanda.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.msk.yml up --build
#
# Required env vars (set in shell before running):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN  (or use a profile)
#
# What changes vs base:
#   - Redpanda + redpanda-init removed (not needed)
#   - MSK_BROKERS → real MSK endpoints (port 9098 SASL_SSL)
#   - KAFKA_AUTH=IAM → enables MSK IAM auth in Job1ParserValidator + MSKSinkBuilder
#   - AWS credentials forwarded from host shell into taskmanager + job-submit
#   - S3 sink → real S3 bucket (not MinIO) — optional, MinIO still available
# ─────────────────────────────────────────────────────────────────────────────

services:

  # Disable local Kafka — not needed when using real MSK
  redpanda:
    profiles: ["disabled"]

  redpanda-init:
    profiles: ["disabled"]

  # Override jobmanager: switch checkpoints to local filesystem to avoid
  # AWS S3 credential conflict with MinIO (host AWS creds hit real S3, not MinIO)
  jobmanager:
    environment:
      MSK_BROKERS: "b-1.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:9098,b-2.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:9098,b-3.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:9098"
      SOURCE_TOPICS:  "ais-terrestrial,ais-satellite,ais-roaming"
      CONSUMER_GROUP: "ais-flink-job1-local-test"
      INGEST_TOPIC:   "ais.ingest"
      AWS_REGION:     "us-east-1"
      KAFKA_AUTH:     "IAM"
      AWS_ACCESS_KEY_ID:     "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_SESSION_TOKEN:     "${AWS_SESSION_TOKEN}"
      S3_BUCKET:      "ais-bronze-local"
      S3_PREFIX:      "ais-bronze-ingest"
      CHECKPOINT_DIR: "file:///tmp/flink-checkpoints/job1"
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        jobmanager.memory.process.size: 1600m
        state.backend: filesystem
        state.checkpoints.dir: file:///tmp/flink-checkpoints/job1
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin

  taskmanager:
    environment:
      MSK_BROKERS: "b-1.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:9098,b-2.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:9098,b-3.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:9098"
      SOURCE_TOPICS:  "ais-terrestrial,ais-satellite,ais-roaming"
      CONSUMER_GROUP: "ais-flink-job1-local-test"
      INGEST_TOPIC:   "ais.ingest"
      AWS_REGION:     "us-east-1"
      KAFKA_AUTH:     "IAM"
      # Pass host AWS credentials into the container
      AWS_ACCESS_KEY_ID:     "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_SESSION_TOKEN:     "${AWS_SESSION_TOKEN}"
      # Keep writing to local MinIO so you don't touch prod S3
      S3_BUCKET:  "ais-bronze-local"
      S3_PREFIX:  "ais-bronze-ingest"
      CHECKPOINT_DIR: "file:///tmp/flink-checkpoints/job1"
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.memory.process.size: 2048m
        taskmanager.numberOfTaskSlots: 4
        state.backend: filesystem
        state.checkpoints.dir: file:///tmp/flink-checkpoints/job1
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin

  job-submit:
    depends_on:
      jobmanager:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      MSK_BROKERS: "b-1.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:9098,b-2.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:9098,b-3.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:9098"
      SOURCE_TOPICS:  "ais-terrestrial,ais-satellite,ais-roaming"
      CONSUMER_GROUP: "ais-flink-job1-local-test"
      INGEST_TOPIC:   "ais.ingest"
      AWS_REGION:     "us-east-1"
      KAFKA_AUTH:     "IAM"
      AWS_ACCESS_KEY_ID:     "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_SESSION_TOKEN:     "${AWS_SESSION_TOKEN}"
      S3_BUCKET:  "ais-bronze-local"
      S3_PREFIX:  "ais-bronze-ingest"

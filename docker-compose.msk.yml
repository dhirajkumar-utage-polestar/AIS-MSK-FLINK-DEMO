# ─────────────────────────────────────────────────────────────────────────────
# Override: read from REAL MSK instead of local Redpanda.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.msk.yml up --build
#
# Required env vars (set in shell before running):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN  (or use a profile)
#
# Network note: MSK brokers are on VPN (10.30.x.x). Docker containers use bridge
# networking and need iptables forwarding to reach VPN subnets. Run once on host:
#   sudo iptables -t nat -A POSTROUTING -s 172.20.0.0/16 -o tun0 -j MASQUERADE
#   sudo iptables -A FORWARD -i br-+ -o tun0 -j ACCEPT
#   sudo iptables -A FORWARD -i tun0 -o br-+ -m state --state RELATED,ESTABLISHED -j ACCEPT
# ─────────────────────────────────────────────────────────────────────────────

services:

  # Disable local Kafka + console — not needed when using real MSK
  redpanda:
    profiles: ["disabled"]

  redpanda-init:
    profiles: ["disabled"]

  redpanda-console:
    profiles: ["disabled"]

  # Override jobmanager: MSK brokers + IAM auth + local filesystem checkpoints
  jobmanager:
    extra_hosts:
      - "b-1.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:10.30.24.63"
      - "b-2.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:10.30.26.172"
      - "b-3.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:10.30.25.160"
    environment:
      MSK_BROKERS: "b-1.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:9098,b-2.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:9098,b-3.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:9098"
      SOURCE_TOPICS:  "ais-terrestrial,ais-satellite,ais-roaming"
      CONSUMER_GROUP: "ais-flink-job1-local-test"
      INGEST_TOPIC:   "ais.ingest"
      AWS_REGION:     "us-east-1"
      KAFKA_AUTH:       "IAM"
      DISABLE_MSK_SINK: "true"
      AWS_ACCESS_KEY_ID:     "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_SESSION_TOKEN:     "${AWS_SESSION_TOKEN}"
      S3_BUCKET:      "ais-bronze-local"
      S3_PREFIX:      "ais-bronze-ingest"
      CHECKPOINT_DIR: "file:///tmp/flink-checkpoints/job1"
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        jobmanager.memory.process.size: 1600m
        state.backend: filesystem
        state.checkpoints.dir: file:///tmp/flink-checkpoints/job1
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin

  taskmanager:
    extra_hosts:
      - "b-1.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:10.30.24.63"
      - "b-2.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:10.30.26.172"
      - "b-3.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:10.30.25.160"
    environment:
      MSK_BROKERS: "b-1.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:9098,b-2.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:9098,b-3.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:9098"
      SOURCE_TOPICS:  "ais-terrestrial,ais-satellite,ais-roaming"
      CONSUMER_GROUP: "ais-flink-job1-local-test"
      INGEST_TOPIC:   "ais.ingest"
      AWS_REGION:     "us-east-1"
      KAFKA_AUTH:       "IAM"
      DISABLE_MSK_SINK: "true"
      AWS_ACCESS_KEY_ID:     "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_SESSION_TOKEN:     "${AWS_SESSION_TOKEN}"
      S3_BUCKET:  "ais-bronze-local"
      S3_PREFIX:  "ais-bronze-ingest"
      CHECKPOINT_DIR: "file:///tmp/flink-checkpoints/job1"
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.memory.process.size: 2048m
        taskmanager.numberOfTaskSlots: 4
        state.backend: filesystem
        state.checkpoints.dir: file:///tmp/flink-checkpoints/job1
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin

  job-submit:
    depends_on:
      jobmanager:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      MSK_BROKERS: "b-1.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:9098,b-2.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:9098,b-3.aismskcluster.fvmx2c.c1.kafka.us-east-1.amazonaws.com:9098"
      SOURCE_TOPICS:  "ais-terrestrial,ais-satellite,ais-roaming"
      CONSUMER_GROUP: "ais-flink-job1-local-test"
      INGEST_TOPIC:   "ais.ingest"
      AWS_REGION:     "us-east-1"
      KAFKA_AUTH:       "IAM"
      DISABLE_MSK_SINK: "true"
      AWS_ACCESS_KEY_ID:     "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_SESSION_TOKEN:     "${AWS_SESSION_TOKEN}"
      S3_BUCKET:  "ais-bronze-local"
      S3_PREFIX:  "ais-bronze-ingest"
